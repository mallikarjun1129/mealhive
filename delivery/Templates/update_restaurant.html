<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Restaurant</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <h1>Update Restaurant Information</h1>
    <form  action="{% url 'update_restaurant' restaurant.id %}" method="POST">
        {% csrf_token %}
        <label>Restaurant Name:</label>
        <input type="text" name="name" value="{{ restaurant.name }}">
        <br><br>
        <label>Picture URL: </label>
        <input type="text" name="picture" value="{{ restaurant.picture }}">
        <br><br>
        <label>Cuisine: </label>
        <input type="text" name="cuisine" value="{{ restaurant.cuisine }}">
        <br><br>
        <label>Rating: </label>
        <input type="number" name="rating" value="{{ restaurant.rating }}" min="0" max="5" step="0.1">
        <br><br>
        <br>
        <button type="submit">Update Restaurant</button>
    </form>
</body>
</html>
