<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Menu</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <h1>{{ restaurant.name }} - Menu</h1>
    <h3>Welcome, {{ username }}!</h3>
    <a href="{% url 'show_cart' username %}">Go to Cart</a>
    <table border="1">
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Picture</th>
                <th>Description</th>
                <th>Price</th>
                <th>Vegetarian</th>
                <th>Operation</th>
                
            </tr>
        </thead>
        <tbody>
            {% for item in itemList %}
            <tr>
                <td>{{ item.name }}</td>
                <td><img src="{{ item.picture }}" ></td>
                <td>{{ item.description }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.vegetarian }}</td>
                <td><a href="{% url 'add_to_cart' item.id username %}">Add to Cart</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
